name: Daily Blog Post

on:
  schedule:
    # Every day at 1:00 PM UTC = 9:00 AM EDT (Eastern Daylight Time, Apr–Nov)
    # Adjust to 14:00 UTC in winter if you want strict 9 AM EST
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic override (leave blank for AI to pick)"
        required: false
        type: string

jobs:
  generate:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Step 1: Topic ─────────────────────────────────────────────────────
      - name: Select topic
        id: topic
        run: |
          BODY="{}"
          if [ -n "${{ inputs.topic }}" ]; then
            BODY=$(printf '{"step":"topic","topic":"%s"}' "${{ inputs.topic }}")
          else
            BODY='{"step":"topic"}'
          fi

          RESPONSE=$(curl -sf --max-time 58 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "topic=$(echo "$RESPONSE" | jq -r '.topic')" >> "$GITHUB_OUTPUT"
          echo "generation_id=$(echo "$RESPONSE" | jq -r '.generationId // empty')" >> "$GITHUB_OUTPUT"
          echo "Topic: $(echo "$RESPONSE" | jq -r '.topic')"

      # ── Step 2: Broad research ────────────────────────────────────────────
      - name: Research industry trends & statistics
        id: research_broad
        run: |
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_broad", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          RESPONSE=$(curl -sf --max-time 58 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "words=$(echo "$RESPONSE" | jq -r '.wordCount')" >> "$GITHUB_OUTPUT"
          echo "Broad research: $(echo "$RESPONSE" | jq -r '.wordCount') words"

      # ── Step 3: GTA / Ontario local research ─────────────────────────────
      - name: Research GTA & Ontario data
        id: research_local
        run: |
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_local", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          RESPONSE=$(curl -sf --max-time 58 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "words=$(echo "$RESPONSE" | jq -r '.wordCount')" >> "$GITHUB_OUTPUT"
          echo "Local research: $(echo "$RESPONSE" | jq -r '.wordCount') words"

      # ── Step 4: Write article ─────────────────────────────────────────────
      - name: Write article
        id: write
        run: |
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"write", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          RESPONSE=$(curl -sf --max-time 58 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "title=$(echo "$RESPONSE" | jq -r '.postData.title')" >> "$GITHUB_OUTPUT"
          echo "words=$(echo "$RESPONSE" | jq -r '.wordCount')" >> "$GITHUB_OUTPUT"
          echo "Article written: $(echo "$RESPONSE" | jq -r '.wordCount') words — $(echo "$RESPONSE" | jq -r '.postData.title')"

      # ── Step 5: Save to database ──────────────────────────────────────────
      - name: Save post to database
        id: save
        run: |
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          # Save step loads rawText from DB via generationId (avoids passing large JSON through env)
          BODY=$(jq -n \
            --arg genId "$GEN_ID" \
            '{step:"save", generationId: (if $genId == "" then null else $genId end)}')

          RESPONSE=$(curl -sf --max-time 58 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "url=$(echo "$RESPONSE" | jq -r '.url')" >> "$GITHUB_OUTPUT"
          echo "Published: https://hnbk.solutions$(echo "$RESPONSE" | jq -r '.url')"

