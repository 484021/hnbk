name: Daily Blog Post

on:
  schedule:
    # Every day at 1:00 PM UTC = 9:00 AM EDT (Eastern Daylight Time, Apr–Nov)
    # Adjust to 14:00 UTC in winter if you want strict 9 AM EST
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic override (leave blank for AI to pick)"
        required: false
        type: string

jobs:
  generate:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    # 5 steps × 55s max each = ~275s + overhead. 10 minutes is generous headroom.
    timeout-minutes: 10

    steps:
      # ── Step 1: Topic ─────────────────────────────────────────────────────
      - name: Select topic
        id: topic
        run: |
          set -euo pipefail
          BODY="{}"
          if [ -n "${{ inputs.topic }}" ]; then
            BODY=$(printf '{"step":"topic","topic":"%s"}' "${{ inputs.topic }}")
          else
            BODY='{"step":"topic"}'
          fi

          # Write response to file so curl exit code is captured cleanly by set -e
          curl -sf --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/response.json

          RESPONSE=$(cat /tmp/response.json)
          echo "topic=$(echo "$RESPONSE" | jq -r '.topic')" >> "$GITHUB_OUTPUT"
          echo "generation_id=$(echo "$RESPONSE" | jq -r '.generationId // empty')" >> "$GITHUB_OUTPUT"
          echo "=== topic step response ==="
          echo "$RESPONSE" | jq '{topic, generationId}'

      # ── Step 2: Broad research ────────────────────────────────────────────
      - name: Research industry trends & statistics
        id: research_broad
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_broad", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          curl -sf --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/response.json

          RESPONSE=$(cat /tmp/response.json)
          echo "words=$(echo "$RESPONSE" | jq -r '.wordCount')" >> "$GITHUB_OUTPUT"
          echo "Broad research: $(echo "$RESPONSE" | jq -r '.wordCount') words"

      # ── Step 3: GTA / Ontario local research ─────────────────────────────
      - name: Research GTA & Ontario data
        id: research_local
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_local", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          curl -sf --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/response.json

          RESPONSE=$(cat /tmp/response.json)
          echo "words=$(echo "$RESPONSE" | jq -r '.wordCount')" >> "$GITHUB_OUTPUT"
          echo "Local research: $(echo "$RESPONSE" | jq -r '.wordCount') words"

      # ── Step 4: Write article ─────────────────────────────────────────────
      - name: Write article
        id: write
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          BODY=$(jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"write", topic: $topic, generationId: (if $genId == "" then null else $genId end)}')

          curl -sf --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/response.json

          # Extract rawText to a file — avoids large shell variable / jq --arg size issues
          jq -r '.rawText // ""' /tmp/response.json > /tmp/raw.txt

          echo "title=$(jq -r '.postData.title' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "words=$(jq -r '.wordCount' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Article: $(jq -r '.wordCount' /tmp/response.json) words — $(jq -r '.postData.title' /tmp/response.json)"

          RAW_SIZE=$(wc -c < /tmp/raw.txt)
          echo "rawText size: ${RAW_SIZE} bytes"
          if [ "$RAW_SIZE" -lt 100 ]; then
            echo "::error::rawText is empty or too short (${RAW_SIZE} bytes) — write step may have failed silently"
            cat /tmp/response.json
            exit 1
          fi

      # ── Step 5: Save to database ──────────────────────────────────────────
      - name: Save post to database
        id: save
        run: |
          set -euo pipefail
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          # Build body using --rawfile (reads directly from file, handles any size)
          jq -n \
            --arg genId "$GEN_ID" \
            --rawfile raw /tmp/raw.txt \
            '{step:"save", generationId: (if $genId == "" then null else $genId end), rawText: $raw}' \
            > /tmp/save_body.json

          echo "Save body size: $(wc -c < /tmp/save_body.json) bytes"

          curl -sf --connect-timeout 10 --max-time 30 \
            -X POST "https://hnbk.solutions/api/admin/blog-step" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/save_body.json \
            -o /tmp/response.json

          cat /tmp/response.json
          echo "url=$(jq -r '.url' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Published: https://hnbk.solutions$(jq -r '.url' /tmp/response.json)"

