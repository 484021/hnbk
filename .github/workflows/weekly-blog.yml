name: Daily Blog Post

on:
  schedule:
    # Every day at 1:00 PM UTC = 9:00 AM EDT (Eastern Daylight Time, Apr–Nov)
    # Adjust to 14:00 UTC in winter if you want strict 9 AM EST
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic override (leave blank for AI to pick)"
        required: false
        type: string

jobs:
  generate:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Step 1: Topic ─────────────────────────────────────────────────────
      - name: Select topic
        id: topic
        run: |
          set -euo pipefail
          BODY="{}"
          if [ -n "${{ inputs.topic }}" ]; then
            BODY=$(printf '{"step":"topic","topic":"%s"}' "${{ inputs.topic }}")
          else
            BODY='{"step":"topic"}'
          fi

          HTTP_CODE=$(curl -sL --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step/" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/response.json \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          echo "--- raw response ---"
          cat /tmp/response.json
          echo ""
          echo "---"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::API returned HTTP $HTTP_CODE"
            exit 1
          fi

          if ! jq empty /tmp/response.json 2>/dev/null; then
            echo "::error::Response is not valid JSON (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "topic=$(jq -r '.topic' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "generation_id=$(jq -r '.generationId // empty' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Topic selected: $(jq -r '.topic' /tmp/response.json)"

      # ── Step 2: Broad research ────────────────────────────────────────────
      - name: Research industry trends & statistics
        id: research_broad
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_broad", topic: $topic, generationId: (if $genId == "" then null else $genId end)}' \
            > /tmp/body.json

          HTTP_CODE=$(curl -sL --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step/" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/body.json \
            -o /tmp/response.json \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::API returned HTTP $HTTP_CODE"; exit 1
          fi
          if ! jq empty /tmp/response.json 2>/dev/null; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::Response is not valid JSON"; exit 1
          fi

          echo "words=$(jq -r '.wordCount' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Broad research: $(jq -r '.wordCount' /tmp/response.json) words"

      # ── Step 3: GTA / Ontario local research ─────────────────────────────
      - name: Research GTA & Ontario data
        id: research_local
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"research_local", topic: $topic, generationId: (if $genId == "" then null else $genId end)}' \
            > /tmp/body.json

          HTTP_CODE=$(curl -sL --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step/" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/body.json \
            -o /tmp/response.json \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::API returned HTTP $HTTP_CODE"; exit 1
          fi
          if ! jq empty /tmp/response.json 2>/dev/null; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::Response is not valid JSON"; exit 1
          fi

          echo "words=$(jq -r '.wordCount' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Local research: $(jq -r '.wordCount' /tmp/response.json) words"

      # ── Step 4: Write article ─────────────────────────────────────────────
      - name: Write article
        id: write
        run: |
          set -euo pipefail
          TOPIC="${{ steps.topic.outputs.topic }}"
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          jq -n \
            --arg topic "$TOPIC" \
            --arg genId "$GEN_ID" \
            '{step:"write", topic: $topic, generationId: (if $genId == "" then null else $genId end)}' \
            > /tmp/body.json

          HTTP_CODE=$(curl -sL --connect-timeout 10 --max-time 55 \
            -X POST "https://hnbk.solutions/api/admin/blog-step/" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/body.json \
            -o /tmp/response.json \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::API returned HTTP $HTTP_CODE"; exit 1
          fi
          if ! jq empty /tmp/response.json 2>/dev/null; then
            echo "--- raw response ---"; cat /tmp/response.json; echo ""
            echo "::error::Response is not valid JSON"; exit 1
          fi

          # Extract rawText to file (avoids shell variable size limits)
          jq -r '.rawText // ""' /tmp/response.json > /tmp/raw.txt
          RAW_SIZE=$(wc -c < /tmp/raw.txt)
          echo "rawText size: ${RAW_SIZE} bytes"
          if [ "$RAW_SIZE" -lt 100 ]; then
            echo "::error::rawText is empty (${RAW_SIZE} bytes)"
            cat /tmp/response.json; exit 1
          fi

          echo "title=$(jq -r '.postData.title' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "words=$(jq -r '.wordCount' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Article: $(jq -r '.wordCount' /tmp/response.json) words — $(jq -r '.postData.title' /tmp/response.json)"

      # ── Step 5: Save to database ──────────────────────────────────────────
      - name: Save post to database
        id: save
        run: |
          set -euo pipefail
          GEN_ID="${{ steps.topic.outputs.generation_id }}"

          jq -n \
            --arg genId "$GEN_ID" \
            --rawfile raw /tmp/raw.txt \
            '{step:"save", generationId: (if $genId == "" then null else $genId end), rawText: $raw}' \
            > /tmp/save_body.json

          echo "Save body size: $(wc -c < /tmp/save_body.json) bytes"

          HTTP_CODE=$(curl -sL --connect-timeout 10 --max-time 30 \
            -X POST "https://hnbk.solutions/api/admin/blog-step/" \
            -H "Authorization: Bearer ${{ secrets.BLOG_GENERATION_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/save_body.json \
            -o /tmp/response.json \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          echo "--- raw response ---"
          cat /tmp/response.json
          echo ""
          echo "---"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Save returned HTTP $HTTP_CODE"; exit 1
          fi

          echo "url=$(jq -r '.url' /tmp/response.json)" >> "$GITHUB_OUTPUT"
          echo "Published: https://hnbk.solutions$(jq -r '.url' /tmp/response.json)"


